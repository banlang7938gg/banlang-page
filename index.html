<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Check-in</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
      color: #1f2937;
    }
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    input, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    button { background: #2563eb; color: white; cursor: pointer; border: none; }
    button:hover { background: #1d4ed8; }
    #map { height: 320px; border-radius: 12px; margin-top: 16px; }
    .status { margin-top: 10px; color: #4b5563; }
    .list { margin-top: 16px; }
    .item { padding: 10px 0; border-bottom: 1px solid #e5e7eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ระบบเช็กชื่อด้วย GPS</h1>
    <p>เช็กชื่อได้เฉพาะในพื้นที่มหาวิทยาลัยราชภัฏเทพสตรี ลพบุรี ภายในระยะ 1 กิโลเมตร</p>

    <div class="row">
      <input id="nameInput" type="text" placeholder="ชื่อของคุณ" />
      <button id="checkinBtn">เช็กชื่อเลย</button>
    </div>

    <div class="status" id="status">กรุณากรอกชื่อและเช็กชื่อภายในพื้นที่มหาวิทยาลัยราชภัฏเทพสตรี ลพบุรี</div>
    <div id="map"></div>

    <div class="list" id="checkinList"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const storageKey = 'gps-checkins';
    const statusEl = document.getElementById('status');
    const nameInput = document.getElementById('nameInput');
    const listEl = document.getElementById('checkinList');
    const button = document.getElementById('checkinBtn');

    const universityCenter = { lat: 14.799994129167628, lng: 100.62213339492743 };
    const allowedRadiusMeters = 1000;

    let map;
    let marker;
    let allowedCircle;

    function initMap() {
      map = L.map('map').setView([universityCenter.lat, universityCenter.lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      allowedCircle = L.circle([universityCenter.lat, universityCenter.lng], {
        color: '#2563eb',
        fillColor: '#60a5fa',
        fillOpacity: 0.15,
        radius: allowedRadiusMeters
      }).addTo(map);
    }

    function loadCheckins() {
      const data = localStorage.getItem(storageKey);
      const items = data ? JSON.parse(data) : [];
      renderCheckins(items);
      return items;
    }

    function renderCheckins(items) {
      if (!items.length) {
        listEl.innerHTML = '<div class="item">ยังไม่มีประวัติการเช็กอิน</div>';
        return;
      }

      listEl.innerHTML = items.slice().reverse().map(item => `
        <div class="item">
          <strong>${item.name}</strong><br/>
          ${item.timestamp}<br/>
          Lat: ${item.lat.toFixed(6)}, Lng: ${item.lng.toFixed(6)}
        </div>
      `).join('');
    }

    function saveCheckin(item) {
      const items = loadCheckins();
      items.push(item);
      localStorage.setItem(storageKey, JSON.stringify(items));
      renderCheckins(items);
    }

    function calculateDistanceMeters(lat1, lng1, lat2, lng2) {
      const toRad = (value) => (value * Math.PI) / 180;
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function updateMap(lat, lng) {
      if (!map) initMap();
      map.setView([lat, lng], 16);
      if (marker) marker.remove();
      marker = L.marker([lat, lng]).addTo(map).bindPopup('เช็กอินที่นี่').openPopup();
    }

    button.addEventListener('click', () => {
      const name = nameInput.value.trim() || 'ไม่ระบุชื่อ';
      if (!navigator.geolocation) {
        statusEl.textContent = 'เบราว์เซอร์ของคุณไม่รองรับ GPS';
        return;
      }

      statusEl.textContent = 'กำลังขอตำแหน่งจากอุปกรณ์...';
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const distance = calculateDistanceMeters(lat, lng, universityCenter.lat, universityCenter.lng);

          if (distance > allowedRadiusMeters) {
            statusEl.textContent = `อยู่นอกพื้นที่มหาวิทยาลัยราชภัฏเทพสตรี ลพบุรี กรุณาเข้ามาในรัศมี ${allowedRadiusMeters / 1000} กิโลเมตร เพื่อเช็กชื่อ`;
            updateMap(lat, lng);
            return;
          }

          const item = {
            name,
            lat,
            lng,
            timestamp: new Date().toLocaleString('th-TH')
          };
          saveCheckin(item);
          updateMap(item.lat, item.lng);
          statusEl.textContent = `เช็กชื่อสำเร็จสำหรับ ${item.name} ที่ ${item.lat.toFixed(6)}, ${item.lng.toFixed(6)} (${distance.toFixed(0)} เมตรจากจุดมหาวิทยาลัย)`;
        },
        (error) => {
          statusEl.textContent = 'ไม่สามารถรับตำแหน่งได้: ' + error.message;
        },
        { enableHighAccuracy: true, timeout: 15000 }
      );
    });

    initMap();
    loadCheckins();
  </script>
</body>
</html>
