<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Check-in</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
      color: #1f2937;
    }
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    input, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    button { background: #2563eb; color: white; cursor: pointer; border: none; }
    button:hover { background: #1d4ed8; }
    #map { height: 320px; border-radius: 12px; margin-top: 16px; }
    .status { margin-top: 10px; color: #4b5563; }
    .list { margin-top: 16px; }
    .item { padding: 10px 0; border-bottom: 1px solid #e5e7eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ระบบเช็กอินด้วย GPS</h1>
    <p>ตัวอย่างฟรีที่ใช้เบราว์เซอร์รับตำแหน่งและบันทึกลงในอุปกรณ์ของคุณ</p>

    <div class="row">
      <input id="nameInput" type="text" placeholder="ชื่อของคุณ" />
      <button id="checkinBtn">เช็กอินตอนนี้</button>
    </div>

    <div class="status" id="status">กำลังรอให้คุณเช็กอิน</div>
    <div id="map"></div>

    <div class="list" id="checkinList"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const storageKey = 'gps-checkins';
    const statusEl = document.getElementById('status');
    const nameInput = document.getElementById('nameInput');
    const listEl = document.getElementById('checkinList');
    const button = document.getElementById('checkinBtn');

    let map;
    let marker;

    function initMap() {
      map = L.map('map').setView([13.7563, 100.5018], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
    }

    function loadCheckins() {
      const data = localStorage.getItem(storageKey);
      const items = data ? JSON.parse(data) : [];
      renderCheckins(items);
      return items;
    }

    function renderCheckins(items) {
      if (!items.length) {
        listEl.innerHTML = '<div class="item">ยังไม่มีประวัติการเช็กอิน</div>';
        return;
      }

      listEl.innerHTML = items.slice().reverse().map(item => `
        <div class="item">
          <strong>${item.name}</strong><br/>
          ${item.timestamp}<br/>
          Lat: ${item.lat.toFixed(6)}, Lng: ${item.lng.toFixed(6)}
        </div>
      `).join('');
    }

    function saveCheckin(item) {
      const items = loadCheckins();
      items.push(item);
      localStorage.setItem(storageKey, JSON.stringify(items));
      renderCheckins(items);
    }

    function updateMap(lat, lng) {
      if (!map) initMap();
      map.setView([lat, lng], 16);
      if (marker) marker.remove();
      marker = L.marker([lat, lng]).addTo(map).bindPopup('เช็กอินที่นี่').openPopup();
    }

    button.addEventListener('click', () => {
      const name = nameInput.value.trim() || 'ไม่ระบุชื่อ';
      if (!navigator.geolocation) {
        statusEl.textContent = 'เบราว์เซอร์ของคุณไม่รองรับ GPS';
        return;
      }

      statusEl.textContent = 'กำลังขอตำแหน่งจากอุปกรณ์...';
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const item = {
            name,
            lat: position.coords.latitude,
            lng: position.coords.longitude,
            timestamp: new Date().toLocaleString('th-TH')
          };
          saveCheckin(item);
          updateMap(item.lat, item.lng);
          statusEl.textContent = `เช็กอินสำเร็จที่ ${item.lat.toFixed(6)}, ${item.lng.toFixed(6)}`;
        },
        (error) => {
          statusEl.textContent = 'ไม่สามารถรับตำแหน่งได้: ' + error.message;
        },
        { enableHighAccuracy: true, timeout: 15000 }
      );
    });

    initMap();
    loadCheckins();
  </script>
</body>
</html>
